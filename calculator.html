    <div class="container">

        <h1>Paint Calculator</h1>

        <p>Enter the room details below.</p>

        <div class="calculator">

            <input type="number" id="length" placeholder="Room Length (feet)">

            <input type="number" id="width" placeholder="Room Width (feet)">

            <input type="number" id="height" placeholder="Room Height (feet)">

            <input type="number" id="doors" placeholder="Number of Doors">

            <input type="number" id="windows" placeholder="Number of Windows">
<input type="number" id="coats" placeholder="Number of Paint Coats">

<label>Select Paint Brand</label>

<select id="brand">

    <option value="350">Asian Paints (₹350/L)</option>

    <option value="320">Berger Paints (₹320/L)</option>

    <option value="300">Nerolac (₹300/L)</option>

    <option value="280">Dulux (₹280/L)</option>

</select>

<button onclick="calculatePaint()">
    Calculate
</button>


        </div>

      <div class="result">

    <h2>Paint Estimation Result</h2>

    <div class="result-box">

        <p id="area"></p>

        <p id="paint"></p>

        <p id="cost"></p>

        <p id="waste"></p>

        <p id="recommendation"></p>

    </div>

</div>
